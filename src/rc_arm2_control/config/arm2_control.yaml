arm2_torque_trajectory_controller:
  ros__parameters:
    action_name: /arm2_controller/follow_joint_trajectory
    # effort_pub_ 发布 JointState MIT 目标命令：
    # position=期望位置，velocity=期望速度，effort=期望前馈力矩。
    command_topic: /arm2/command/effort
    # joint_state_sub_ 订阅关节状态
    joint_state_topic: /joint_states
    # payload_sub_ 订阅负载吸附状态，请外部结点发布
    payload_command_topic: /arm2/payload_attached
    # payload_active_pub_ 发布当前使用的模型是带负载还是空载，供 MuJoCo 订阅以启用/关闭 weld 连接
    payload_active_topic: /arm2/payload_active
    # state_pub_ 发布结构化控制器状态 rc_arm2_msgs/msg/Arm2ControllerState
    # int32 controller_state
    #  UNKNOWN=0
    #  STARTUP=1
    #  HOLDING=2
    #  EXECUTING=3
    #  FAULT=4
    # 
    #  bool payload_attached
    #  bool pending_payload_switch
    #
    #  int32 detail_code
    #  NONE=0
    #  INITIALIZED=1
    #  GOAL_ACCEPTED=2
    #  FIRST_JOINT_STATE_RECEIVED=3
    #  PAYLOAD_SWITCH_PENDING=4
    #  HOLDING_TORQUE_SATURATION_FAULT=5
    #  NONFINITE_FEEDFORWARD_TORQUE=6
    #  GOAL_SUCCEEDED=7
    #  EXECUTION_TORQUE_SATURATION_ABORT=8
    #  GOAL_TOLERANCE_VIOLATED=9
    #  CANCEL_REQUESTED=10
    #  PAYLOAD_ATTACHED=11
    #  PAYLOAD_DETACHED=12
    state_topic: /arm2_controller/state
    # 控制周期频率，单位 Hz，默认 250 Hz
    control_rate_hz: 500.0
    # 每秒向 FollowJointTrajectory action client 反馈 20 次状态，避免 feedback 消息太频繁。
    feedback_rate_hz: 20.0
    joint_names: [j1, j2, j3, j4]
    # 每个关节的力矩限制，以及 MIT 闭环增益。
    # 仿真和真机电机驱动都使用下面的 `*_unloaded` / `*_loaded`
    # 两套参数，并在 payload_active 切换时自动切换。
    effort_limits: [10.0, 10.0, 10.0, 10.0]
    kp_unloaded: [25.0, 50.0, 30.0, 5.0]
    kd_unloaded: [2.0, 5.0, 3.0, 0.03]
    kp_loaded: [120.0, 200.0, 150.0, 120.0]
    kd_loaded: [21.9, 40.0, 24.5, 21.9]
    # 如果连续的力矩饱和时间超过 saturation_abort_sec_，则认为执行失败并进入 FAULT 状态。
    saturation_abort_sec: 0.25
    # 执行轨迹时，如果最终位置与目标位置的误差小于 goal_tolerance_rad_，
    # 且持续时间超过 settle_time_sec_，则认为执行成功并进入 HOLDING 状态。
    goal_tolerance_rad: 0.02
    settle_time_sec: 1.5
    # 负载相关参数。tool0_frame_name 必须存在于 URDF 中；
    # 正方体质心位于 tool0 的 +Z 方向 payload_cube_side / 2。
    tool0_frame_name: tool0
    # 默认负载质量 0.2 kg，边长 0.08 m，用户可以根据实际负载调整这两个参数以获得更准确的动力学补偿。
    payload_mass: 0.7
    payload_cube_side: 0.35

arm2_mujoco_real:
  ros__parameters:
    # 与 URDF 正方向一致的关节方向系数；真机中 j2、j4 需要取反。
    joint_directions: [1, 1, 1, -1]
    vacuum_activate_topic: /arm2/vacuum_activate

arm2_mujoco_sim:
  ros__parameters:
    sync_payload_with_controller: true
    enable_viewer: true
    timestep: 0.001
    joint_state_rate_hz: 500.0

arm2_middleware:
  ros__parameters:
    # 接收外部发布命令话题
    command_topic: /arm2/middleware/command
    # 视觉提供物体位置
    target_point_topic: /arm2/middleware/target_point
    # middle状态
    middleware_state_topic: /arm2/middleware/state
    # 命令动作接口
    task_goal_action_name: /arm2_task_goal
    planning_time: 5.0
    action_server_timeout_sec: 2.0
    action_result_timeout_sec: 30.0
    payload_wait_timeout_sec: 5.0
    # [x, y, z, spin]
    # 暂存常量点位
    staging_pose: [0.25, 0.5, 0.175, 0.0]
    # 默认常量点位
    default_pose: [0.19, 0.0, 0.242, 0.0]
    # Flattened [x, y, z, spin] entries for 0-based warehouse indices.
    warehouse_poses: [
      0.25, -0.25, 0.175, 0.0,
      0.25, 0.04, 0.175, 0.0,
      0.25, 0.25, 0.175, 0.0
    ]
